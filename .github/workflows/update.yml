name: Actualizar Radar

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Correr scraper
        env:
          NOCNOK_USER: ${{ secrets.NOCNOK_USER }}
          NOCNOK_PASS: ${{ secrets.NOCNOK_PASS }}
        run: python3 scraper.py -u "$NOCNOK_USER" -p "$NOCNOK_PASS"

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/properties.json data/history.json data/weekly_stats.json
          git diff --staged --quiet || git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Publicar en Vercel
        run: npx vercel deploy --yes --prod --token ${{ secrets.VERCEL_TOKEN }} --quiet
