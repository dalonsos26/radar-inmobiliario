name: Actualizar Radar

on:
  workflow_dispatch:
  schedule:
    # 8:30am hora de Torreón (UTC-6) = 14:30 UTC
    - cron: '30 14 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Correr scraper
        env:
          NOCNOK_USER: ${{ secrets.NOCNOK_USER }}
          NOCNOK_PASS: ${{ secrets.NOCNOK_PASS }}
        run: python3 scraper.py -u "$NOCNOK_USER" -p "$NOCNOK_PASS"

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties.json data/history.json data/weekly_stats.json data/archive.json data/oportunidades.json data/map_props.json
          git diff --staged --quiet || git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')"
          git push
